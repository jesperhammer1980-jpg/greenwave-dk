name: Update fuel prices

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-fuel-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Update fuel prices
        run: node scripts/update-fuel-prices.js

      - name: Commit updated fuel prices
        run: |
          git config user.name "greenwave-bot"
          git config user.email "greenwave-bot@users.noreply.github.com"
          git add fuel-prices.json
          git diff --cached --quiet || git commit -m "Update fuel prices"
          git push
