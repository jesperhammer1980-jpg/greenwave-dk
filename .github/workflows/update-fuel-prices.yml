name: Update fuel prices

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-fuel-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Update fuel prices
        run: npm run update:fuel

      - name: Commit updated fuel-prices.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update fuel prices"
          file_pattern: fuel-prices.json
