<!DOCTYPE html>

<link rel="stylesheet" href="./styles/style.css?v=corridor1" />
<style>body{overflow:auto}.diag{padding:22px}.diag-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}.diag-card{background:#101c2c;border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:16px}.diag-card strong{font-size:34px;color:#67ffb4}.diag-card.error strong{color:#ff6868}.diag-card small{color:rgba(255,255,255,.6)}pre{white-space:pre-wrap;background:#07111d;border-radius:16px;padding:14px;overflow:auto}</style>

<body>
<main class="diag">
<h1>GreenWave Diagnostics</h1>

<div class="search-card"><input id="from" value="Lupinvej 3, 3390 Hundested"><input id="to" value="Herstedøstervej 27, 2620 Albertslund"><button id="run">Kør test</button></div>
<div id="summary" class="diag-grid" style="margin-top:16px"></div>
<pre id="raw">Klar</pre>
</main>
