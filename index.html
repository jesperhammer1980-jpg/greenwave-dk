<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>GreenWave</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="app-shell">

  <!-- HEADER -->
  <header class="hero">
    <div class="hero-copy">
      <span class="eyebrow">GreenWave</span>
      <h1 id="titleText">Billigste brændstof</h1>
      <p>Find billigste tankstation langs din rute</p>
    </div>

    <div class="hero-status">
      <div id="gpsStatusChip" class="status-chip">GPS: klar</div>
      <div id="navStatusChip" class="status-chip">Navigation: inaktiv</div>
      <div id="mapModeLabel" class="map-pill">Kort: klar</div>
    </div>
  </header>

  <main class="app-grid">

    <!-- LEFT -->
    <div class="left-column">

      <section class="panel">

        <label>Destination</label>

        <div class="search-wrap">
          <input id="destinationInput" placeholder="Indtast adresse..." />

          <div id="autocompleteBox" class="autocomplete-box hidden">
            <div id="autocompleteList"></div>
          </div>
        </div>

        <div class="button-row">
          <button id="calcRouteBtn" class="btn-primary">Beregn rute</button>
          <button id="startNavBtn" class="btn-accent" disabled>Start</button>
        </div>

        <div class="button-row">
          <button id="stopNavBtn" class="btn-danger" disabled>Stop</button>
          <button id="recenterBtn" class="btn-muted">Centrér</button>
        </div>

        <div class="button-row">
          <button id="historyToggleBtn" class="btn-muted">Historik</button>
          <button id="openSettingsBtn" class="btn-muted">Settings</button>
        </div>

        <div id="historyBox" class="history-box hidden">
          <div class="history-title">Seneste destinationer</div>
          <div id="historyList" class="history-list"></div>
        </div>

      </section>

      <!-- FUEL -->
      <section id="fuelPanel" class="panel">
        <div class="panel-head">
          <h2>Billigste tank</h2>
        </div>

        <div id="fuelDisclaimer" class="fuel-disclaimer"></div>
        <div id="fuelContent"></div>

        <div class="button-row single">
          <button id="openFuelListBtn" class="btn-primary">Se billigste på ruten</button>
        </div>

        <div class="button-row single">
          <button id="openFuelHistoryBtn" class="btn-muted">Se prishistorik</button>
        </div>
      </section>

    </div>

    <!-- MAP -->
    <div class="center-column">
      <section class="map-panel">

        <div id="map-rotation-wrap">
          <div id="map-rotation-inner">
            <div id="map"></div>
          </div>
        </div>

        <!-- NAV OVERLAY -->
        <div id="navOverlay" class="nav-overlay hidden">

          <div class="nav-top">
            <div class="nav-top-actions">
              <button id="exitNavOverlayBtn" class="overlay-btn overlay-btn-danger">Stop</button>
            </div>

            <div id="navBannerMain">—</div>
            <div id="navBannerSub">—</div>
          </div>

          <div class="nav-bottom">
            <div class="nav-bottom-main">
              <div class="nav-meta">
                <span>Afstand</span>
                <strong id="driveRemainingDistance">—</strong>
              </div>
              <div class="nav-meta">
                <span>Tid</span>
                <strong id="driveRemainingTime">—</strong>
              </div>
              <div class="nav-meta">
                <span>Speed</span>
                <strong id="driveCurrentValue">—</strong>
              </div>
            </div>
          </div>

        </div>

      </section>
    </div>

  </main>
</div>

<!-- SETTINGS -->
<div id="settingsBackdrop" class="settings-backdrop hidden"></div>

<div id="settingsPanel" class="settings-panel hidden">

  <div class="settings-header">
    <h2>Indstillinger</h2>
    <button id="closeSettingsBtn" class="btn-muted small">Luk</button>
  </div>

  <div class="settings-body">

    <div class="settings-section">
      <h3>Sprog</h3>

      <label class="settings-option">
        <input type="radio" id="languageDa" name="language" checked />
        <span>Dansk</span>
      </label>

      <label class="settings-option">
        <input type="radio" id="languageEn" name="language" />
        <span>English</span>
      </label>
    </div>

    <div class="settings-section">
      <h3>Marked</h3>

      <label class="settings-option">
        <input type="radio" id="regionDK" name="region" checked />
        <span>Danmark</span>
      </label>

      <label class="settings-option">
        <input type="radio" id="regionUS" name="region" />
        <span>USA</span>
      </label>
    </div>

    <div class="settings-section">
      <h3>Rute</h3>

      <label class="settings-option">
        <input type="radio" id="settingsRouteFast" name="routeMode" checked />
        <span>Hurtigste</span>
      </label>

      <label class="settings-option">
        <input type="radio" id="settingsRouteEco" name="routeMode" />
        <span>Økonomisk</span>
      </label>
    </div>

  </div>

  <div class="settings-footer">
    <button id="saveSettingsBtn" class="btn-primary">Gem</button>
  </div>

</div>

<!-- FUEL LIST -->
<div id="fuelListBackdrop" class="modal-backdrop hidden"></div>

<div id="fuelListModal" class="fuel-list-modal hidden">
  <div class="fuel-list-header">
    <h2>Billigste stationer</h2>
    <button id="closeFuelListBtn" class="btn-muted small">Luk</button>
  </div>

  <div class="fuel-list-controls">
    <button id="sortFuelByPriceBtn" class="btn-primary small">Pris</button>
    <button id="sortFuelByDetourBtn" class="btn-muted small">Omvej</button>
  </div>

  <div id="fuelListContent" class="fuel-list-content"></div>
</div>

<!-- PRICE HISTORY -->
<div id="fuelHistoryBackdrop" class="modal-backdrop hidden"></div>

<div id="fuelHistoryModal" class="fuel-list-modal hidden">
  <div class="fuel-list-header">
    <h2>Prishistorik</h2>
    <button id="closeFuelHistoryBtn" class="btn-muted small">Luk</button>
  </div>

  <div id="fuelHistoryContent" class="fuel-list-content"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
