<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>GreenWave DK Companion</title>
  <meta name="theme-color" content="#07111d" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="./styles/style.css?v=resilient1" />
</head>
<body>
  <main id="app">
    <div id="map"></div>

    <header class="topbar">
      <div class="brand"><span></span>GreenWave DK</div>
      <button id="settingsBtn" class="icon-btn" type="button">⚙</button>
    </header>

    <section class="panel">
      <div class="search-card">
        <input id="destinationInput" type="text" placeholder="Destination i Danmark" autocomplete="off" />
        <button id="goBtn" type="button">GO</button>
      </div>

      <div id="autocompleteResults" class="autocomplete hidden"></div>

      <section id="historySection" class="history-card hidden">
        <h2>Seneste destinationer</h2>
        <div id="historyList" class="history-list"></div>
      </section>

      <div id="statusText" class="status">Klar</div>

      <section class="gw">
        <div><span>Anbefalet</span><strong id="recommendedSpeed">--</strong><small>km/t</small></div>
        <div><span>Max</span><strong id="speedLimit">?</strong><small>km/t</small></div>
        <div><span>Aktuel</span><strong id="currentSpeed">0</strong><small>km/t</small></div>
      </section>

      <div id="reasonText" class="reason">Beregn en rute for at starte GreenWave.</div>

      <section class="actions">
        <button id="startBtn" type="button" disabled>Start GreenWave</button>
        <button id="stopBtn" type="button" disabled>Stop</button>
        <button id="recalcBtn" type="button" disabled>Genberegn</button>
      </section>

      <section class="trip">
        <div><span>Afstand</span><strong id="routeDistance">—</strong></div>
        <div><span>Tid</span><strong id="routeDuration">—</strong></div>
        <div><span>ETA</span><strong id="routeEta">—</strong></div>
      </section>

      <section class="fuel">
        <header>
          <h2>Tankstationer langs ruten</h2>
          <button id="fuelRefreshBtn" type="button" disabled>Opdater</button>
        </header>
        <div id="fuelSummary">Beregn en rute først.</div>
        <div id="fuelList"></div>
      </section>
    </section>

    <div id="settingsBackdrop" class="modal-backdrop hidden"></div>
    <section id="settingsModal" class="modal hidden">
      <header>
        <h2>Settings</h2>
        <button id="closeSettingsBtn" type="button">✕</button>
      </header>

      <div class="settings-body">
        <section>
          <h3>Brændstoftype</h3>
          <select id="fuelTypeSelect">
            <option value="benzin95">Benzin 95 / E10</option>
            <option value="benzin98">Benzin 98 / E5</option>
            <option value="diesel">Diesel</option>
            <option value="premiumDiesel">Premium diesel</option>
          </select>
        </section>

        <section>
          <h3>Tankstationer</h3>
          <label for="fuelDetourSelect">Maks. afstand fra ruten</label>
          <select id="fuelDetourSelect">
            <option value="1000">1 km fra ruten</option>
            <option value="2000">2 km fra ruten</option>
            <option value="5000">5 km fra ruten</option>
            <option value="10000">10 km fra ruten</option>
            <option value="15000">15 km fra ruten</option>
          </select>
        </section>


        <section>
          <h3>Fuel-visning</h3>
          <label for="fuelAlongSelect">Vis stationer inden for de næste</label>
          <select id="fuelAlongSelect">
            <option value="50000">50 km</option>
            <option value="100000">100 km</option>
            <option value="200000">200 km</option>
          </select>

          <label for="fuelSortSelect">Sortering</label>
          <select id="fuelSortSelect">
            <option value="cheapest">Billigste</option>
            <option value="detour">Nærmest fra ruten</option>
            <option value="upcoming">Førstkommende langs ruten</option>
          </select>
        </section>
        <section>
          <h3>Rute</h3>
          <select id="routeModeSelect">
            <option value="fast">Hurtigste</option>
            <option value="eco">Mest økonomisk</option>
          </select>
        </section>
      </div>

      <footer><button id="saveSettingsBtn" type="button">Gem</button></footer>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="./scripts/app.js?v=resilient1"></script>
</body>
</html>
