<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />

  <title>GreenWave</title>

  <!-- LEAFLET -->

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <!-- APP CSS -->

  <link
    rel="stylesheet"
    href="styles/base.css?v=2"
  />

  <link
    rel="stylesheet"
    href="styles/navigation.css?v=2"
  />
</head>

<body>

  <div class="app-grid">

    <!-- LEFT -->

    <aside class="left-column">

      <section class="hero">
        <h1>GreenWave</h1>

        <p class="muted" style="margin-top:10px;">
          Intelligent navigation med GreenWave,
          live hastighedsanbefalinger og brændstofpriser.
        </p>
      </section>

      <section class="panel">

        <label
          class="label"
          for="destinationInput"
        >
          Destination
        </label>

        <input
          id="destinationInput"
          type="text"
          autocomplete="off"
          placeholder="Indtast adresse..."
        />

        <div
          id="autocompleteResults"
          class="autocomplete-results"
        ></div>

        <div
          style="
            display:grid;
            gap:12px;
            margin-top:16px;
          "
        >

          <button id="calcRouteBtn">
            Beregn rute
          </button>

          <button
            id="startNavBtn"
            disabled
          >
            Start
          </button>

          <button
            id="stopNavBtn"
            disabled
            style="
              background:
                linear-gradient(
                  180deg,
                  #ff5f57,
                  #d92929
                );
            "
          >
            Stop
          </button>

          <button id="centerBtn">
            Centrér
          </button>

          <button id="historyBtn">
            Historik
          </button>

          <button id="settingsBtn">
            Settings
          </button>

        </div>

      </section>

      <!-- STATUS -->

      <section class="panel">

        <div class="status-grid">

          <div class="status-item">
            <span class="status-label">
              GPS
            </span>

            <strong
              id="gpsStatus"
              class="status-value"
            >
              klar
            </strong>
          </div>

          <div class="status-item">
            <span class="status-label">
              Navigation
            </span>

            <strong
              id="navStatus"
              class="status-value"
            >
              inaktiv
            </strong>
          </div>

          <div class="status-item">
            <span class="status-label">
              Kort
            </span>

            <strong
              id="mapStatus"
              class="status-value"
            >
              klar
            </strong>
          </div>

        </div>

      </section>

      <!-- FUEL -->

      <section class="panel">

        <div
          style="
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:14px;
          "
        >

          <h3>Billigste tank</h3>

          <button
            id="showFuelBtn"
            style="
              width:auto;
              padding:10px 14px;
            "
          >
            Se billigste på ruten
          </button>

        </div>

        <div id="fuelBox">
          Beregn en rute først.
        </div>

        <div style="margin-top:12px;">
          <button
            id="fuelHistoryBtn"
            style="
              width:auto;
              padding:10px 14px;
            "
          >
            Se prishistorik
          </button>
        </div>

      </section>

    </aside>

    <!-- CENTER -->

    <main class="center-column">

      <section class="map-panel">

        <div id="map-rotation-wrap">

          <div id="map-rotation-inner">

            <div id="map"></div>

          </div>

        </div>

        <!-- NAVIGATION OVERLAY -->

        <div
          id="navOverlay"
          class="nav-overlay hidden"
        >

          <!-- TURN CARD -->

          <div class="turn-card">

            <div class="turn-card-top">

              <div
                id="turnIcon"
                class="turn-icon"
              >
                ↑
              </div>

              <div class="turn-copy">

                <div
                  id="nextTurnDistance"
                  class="turn-distance"
                >
                  —
                </div>

                <div
                  id="nextTurnInstruction"
                  class="turn-instruction"
                >
                  Fortsæt ligeud
                </div>

                <div
                  id="nextTurnRoad"
                  class="turn-road"
                >
                  GreenWave navigation
                </div>

              </div>

              <button
                id="overlayStopBtn"
                class="overlay-btn"
              >
                Stop
              </button>

            </div>

            <div class="turn-progress-wrap">

              <div
                id="turnProgressBar"
                class="turn-progress-bar"
                style="width:12%;"
              ></div>

            </div>

          </div>

          <!-- SPEED SIGNS -->

          <div class="speed-sign-stack">

            <!-- MAX -->

            <div class="speed-sign-block">

              <div class="speed-sign-label">
                Max
              </div>

              <div
                class="speed-sign speed-sign-limit"
              >
                <span id="speedLimitValue">
                  ?
                </span>
              </div>

            </div>

            <!-- CURRENT -->

            <div class="speed-sign-block">

              <div class="speed-sign-label">
                Aktuel
              </div>

              <div
                id="currentSpeedSign"
                class="speed-sign speed-sign-current"
              >
                <span id="currentSpeedValue">
                  0
                </span>
              </div>

            </div>

            <!-- RECOMMENDED -->

            <div class="speed-sign-block">

              <div class="speed-sign-label">
                Anbefalet
              </div>

              <div
                class="speed-sign speed-sign-recommended"
              >
                <span id="recommendedSpeedValue">
                  ?
                </span>
              </div>

            </div>

          </div>

          <!-- BOTTOM BAR -->

          <div class="nav-bottom">

            <div class="nav-bottom-main">

              <div class="nav-meta">

                <span>
                  Afstand
                </span>

                <strong
                  id="driveRemainingDistance"
                >
                  —
                </strong>

              </div>

              <div class="nav-meta">

                <span>
                  Tid
                </span>

                <strong
                  id="driveRemainingTime"
                >
                  —
                </strong>

              </div>

              <div class="nav-meta">

                <span>
                  Speed
                </span>

                <strong
                  id="driveCurrentValue"
                >
                  0 km/t
                </strong>

              </div>

            </div>

          </div>

        </div>

      </section>

    </main>

  </div>

  <!-- LEAFLET -->

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- APP -->

  <script
    type="module"
    src="scripts/main.js?v=26"
  ></script>

</body>
</html>
